<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WHCS Challenge Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#f4f3ef;--surface:#fff;
    --border:#e2e0d8;--border-strong:#c8c5b8;
    --text:#1a1917;--text-2:#6b6860;--text-3:#9e9b92;
    --accent:#2d6a4f;--accent-l:#e8f4ee;--accent-d:#52b788;
    --solved:#d8f3dc;--solved-b:#74c69d;--solved-t:#1b4332;
    --danger:#e63946;
    --sh-sm:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
    --sh-md:0 4px 16px rgba(0,0,0,.08),0 1px 4px rgba(0,0,0,.04);
    --sh-lg:0 20px 60px rgba(0,0,0,.12),0 4px 16px rgba(0,0,0,.06);
    --r:10px;--rs:6px;
  }
  html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.5}

  /* ── HEADER ── */
  header{position:sticky;top:0;z-index:50;background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;height:60px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--sh-sm)}
  .h-left{display:flex;align-items:center;gap:.75rem}
  .logo{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center}
  .logo svg{width:18px;height:18px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .site-title{font-size:.95rem;font-weight:600;letter-spacing:-.01em}
  .score-pill{display:flex;align-items:center;gap:.5rem;background:var(--accent-l);border:1px solid var(--solved-b);border-radius:100px;padding:.35rem 1rem}
  .score-label{font-size:.75rem;font-weight:500;color:var(--accent);text-transform:uppercase;letter-spacing:.06em}
  .score-value{font-family:'DM Mono',monospace;font-size:1rem;font-weight:500;color:var(--accent);transition:transform .4s cubic-bezier(.34,1.56,.64,1)}
  .score-value.bump{transform:scale(1.3)}

  /* ── FILTER BAR ── */
  .filter-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:.75rem 2rem;display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
  .filter-label{font-size:.7rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);white-space:nowrap}
  .filter-tags{display:flex;flex-wrap:wrap;gap:.4rem}
  .ftag{font-family:'DM Mono',monospace;font-size:.72rem;font-weight:500;background:var(--bg);border:1.5px solid var(--border);border-radius:100px;padding:.25rem .75rem;cursor:pointer;color:var(--text-2);transition:border-color .15s,background .15s,color .15s;user-select:none}
  .ftag:hover{border-color:var(--border-strong);color:var(--text)}
  .ftag.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .filter-clear{font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:500;background:transparent;border:none;color:var(--text-3);cursor:pointer;padding:.25rem .5rem;border-radius:var(--rs);transition:color .15s,background .15s;display:none}
  .filter-clear:hover{color:var(--text);background:var(--bg)}
  .filter-clear.visible{display:block}

  /* ── MAIN ── */
  main{padding:2rem;max-width:1600px;margin:0 auto}
  .cat-section{margin-bottom:2.5rem}
  .cat-section.hidden{display:none}
  .cat-header{display:flex;align-items:baseline;gap:.75rem;margin-bottom:1rem}
  .cat-name{font-size:1.1rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text)}
  .cat-line{flex:1;height:1px;background:var(--border)}
  .cat-count{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--text-3)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:.75rem}

  /* ── CARD ── */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:.875rem 1rem;aspect-ratio:2/1;cursor:pointer;transition:border-color .15s,box-shadow .15s,transform .1s,background .2s,opacity .15s;box-shadow:var(--sh-sm);user-select:none;position:relative;overflow:hidden}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--border-strong);transition:background .2s}
  .card:hover{border-color:var(--border-strong);box-shadow:var(--sh-md);transform:translateY(-1px)}
  .card.solved{background:var(--solved);border-color:var(--solved-b)}
  .card.solved::before{background:var(--accent-d)}
  .card.solved:hover{border-color:var(--accent-d)}
  .card.tag-hidden{opacity:.25;pointer-events:none}
  .card-name{font-size:.825rem;font-weight:500;color:var(--text);margin-bottom:.3rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card.solved .card-name{color:var(--solved-t)}
  .card-pts{font-family:'DM Mono',monospace;font-size:.75rem;color:var(--text-3)}
  .card.solved .card-pts{color:var(--accent)}
  .solved-icon{position:absolute;top:.5rem;right:.5rem;width:16px;height:16px;opacity:0;transition:opacity .3s}
  .card.solved .solved-icon{opacity:1}

  /* no-results notice */
  .no-results{font-size:.85rem;color:var(--text-3);padding:.5rem 0;display:none}
  .no-results.visible{display:block}

  /* ── LOADING / ERROR ── */
  #loadState{display:flex;align-items:center;justify-content:center;min-height:40vh;font-size:.9rem;color:var(--text-3)}

  /* ── MODAL ── */
  .overlay{position:fixed;inset:0;z-index:100;background:rgba(20,18,16,.45);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:1.5rem;opacity:0;pointer-events:none;transition:opacity .2s}
  .overlay.open{opacity:1;pointer-events:all}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:21px;box-shadow:var(--sh-lg);width:100%;max-width:720px;padding:3rem;transform:translateY(18px) scale(.98);transition:transform .25s cubic-bezier(.34,1.3,.64,1);position:relative;max-height:90vh;overflow-y:auto}
  .overlay.open .modal{transform:translateY(0) scale(1)}
  .m-close{position:absolute;top:1.5rem;right:1.5rem;width:42px;height:42px;border:1px solid var(--border);background:transparent;border-radius:var(--rs);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-3);transition:background .15s,color .15s}
  .m-close:hover{background:var(--bg);color:var(--text)}
  .m-close svg{width:21px;height:21px}
  .m-tag{display:inline-block;font-size:.975rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);background:var(--accent-l);border:1px solid var(--solved-b);border-radius:100px;padding:.3rem .9rem;margin-bottom:1.125rem}
  .m-title{font-size:1.875rem;font-weight:600;letter-spacing:-.02em;margin-bottom:.375rem}
  .m-pts{font-family:'DM Mono',monospace;font-size:1.2rem;color:var(--text-3);margin-bottom:1.875rem}
  .m-hr{height:1.5px;background:var(--border);margin-bottom:1.875rem}
  .m-meta{display:flex;flex-wrap:wrap;gap:.75rem;margin-bottom:1.5rem}
  .meta-chip{font-family:'DM Mono',monospace;font-size:1.05rem;font-weight:500;background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:.375rem .9rem;color:var(--text-2)}
  .m-desc{font-size:.875rem;color:var(--text-2);line-height:1.65;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:1.3125rem 1.5rem;margin-bottom:1.875rem;min-height:120px;white-space:pre-wrap;text-align:center;display:flex;align-items:center;justify-content:center}
  .ans-section label{display:block;font-size:.75rem;font-weight:500;color:var(--text-3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.5rem}
  .ans-row{display:flex;gap:.5rem}
  .ans-input{flex:1;font-family:'DM Mono',monospace;font-size:.85rem;border:1px solid var(--border);border-radius:var(--rs);padding:.6rem .875rem;background:var(--surface);color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s}
  .ans-input:focus{border-color:var(--accent-d);box-shadow:0 0 0 3px rgba(82,183,136,.15)}
  .ans-input.err{border-color:var(--danger);box-shadow:0 0 0 3px rgba(230,57,70,.12);animation:shake .4s ease}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}60%{transform:translateX(5px)}80%{transform:translateX(-3px)}}
  .sub-btn{font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:500;background:var(--accent);color:#fff;border:none;border-radius:var(--rs);padding:.6rem 1.1rem;cursor:pointer;transition:background .15s,transform .1s;white-space:nowrap}
  .sub-btn:hover{background:#245e44}
  .sub-btn:active{transform:scale(.97)}
  .fb{font-size:.78rem;margin-top:.5rem;min-height:1.1em;font-weight:500}
  .fb.ok{color:var(--accent)}.fb.bad{color:var(--danger)}
  .solved-ts-box{background:var(--solved);border:1px solid var(--solved-b);border-radius:var(--r);padding:.875rem 1rem;margin-bottom:1rem}
  .solved-ts-label{font-size:.7rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin-bottom:.3rem}
  .solved-ts-value{font-family:'DM Mono',monospace;font-size:.82rem;color:var(--solved-t)}
  .sub-btn-locked{font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:500;width:100%;background:var(--bg);color:var(--text-3);border:1px solid var(--border);border-radius:var(--rs);padding:.6rem 1.1rem;cursor:pointer;transition:background .15s}
  .sub-btn-locked:hover{background:var(--border)}
  .fb-already{font-size:.78rem;margin-top:.5rem;min-height:1.1em;font-weight:500;color:var(--text-3);text-align:center}

  /* ── TOAST ── */
  .toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:#fff;font-size:.82rem;font-weight:500;padding:.6rem 1.2rem;border-radius:100px;z-index:200;opacity:0;transition:opacity .25s,transform .3s cubic-bezier(.34,1.4,.64,1);pointer-events:none;white-space:nowrap}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  ::-webkit-scrollbar{width:6px}
  ::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:3px}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="h-left">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <span class="site-title">WHCS Challenge Board</span>
  </div>
  <div class="h-right">
    <div class="score-pill">
      <span class="score-label">Score</span>
      <span class="score-value" id="totalScore">0</span>
    </div>
  </div>
</header>

<!-- FILTER BAR (populated after data loads) -->
<div class="filter-bar" id="filterBar" style="display:none">
  <span class="filter-label">Filter by tag</span>
  <div class="filter-tags" id="filterTags"></div>
  <button class="filter-clear" id="filterClear">Clear filters</button>
</div>

<!-- BOARD -->
<main id="boardMain">
  <div id="loadState">Loading challenges…</div>
</main>

<!-- CHALLENGE MODAL -->
<div class="overlay" id="playOverlay">
  <div class="modal">
    <button class="m-close" id="playClose">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
    <div class="m-tag" id="mCat"></div>
    <div class="m-title" id="mTitle"></div>
    <div class="m-pts" id="mPts"></div>
    <div class="m-hr"></div>
    <div class="m-meta" id="mMeta"></div>
    <div class="m-desc" id="mDesc"></div>

    <!-- unsolved -->
    <div class="ans-section" id="ansSection">
      <label>Flag / Answer</label>
      <div class="ans-row">
        <input class="ans-input" id="ansInput" type="text" placeholder="WHCS{...}" autocomplete="off" spellcheck="false">
        <button class="sub-btn" id="subBtn">Submit</button>
      </div>
      <div class="fb" id="fb"></div>
    </div>

    <!-- solved -->
    <div id="solvedSection" style="display:none">
      <div class="solved-ts-box">
        <div class="solved-ts-label">Solved on</div>
        <div class="solved-ts-value" id="solvedTs">—</div>
      </div>
      <button class="sub-btn-locked" id="alreadyBtn">Submit</button>
      <div class="fb-already" id="fbAlready"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ════════════════════════════════════════════════════════
   SHA-256
   ════════════════════════════════════════════════════════ */
async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

/* ════════════════════════════════════════════════════════
   RUNTIME STATE
   ════════════════════════════════════════════════════════ */
const challenges = {};   // { category: [challenge, …] }
let score       = 0;
let activePlay  = null;
let activeTags  = new Set();   // currently selected filter tags

/* ════════════════════════════════════════════════════════
   LOCALSTORAGE — keyed by challenge name (stable across
   JSON edits as long as names don't change)
   ════════════════════════════════════════════════════════ */
function saveProgress() {
  const solvedNames = [];
  const tsMap = {};
  Object.keys(challenges).forEach(cat => {
    challenges[cat].forEach(ch => {
      if (ch.solved) {
        const key = `${cat}|${ch.name}`;
        solvedNames.push(key);
        if (ch.solvedAt) tsMap[key] = ch.solvedAt;
      }
    });
  });
  localStorage.setItem('whcs_score',  score);
  localStorage.setItem('whcs_solved', JSON.stringify(solvedNames));
  localStorage.setItem('whcs_ts',     JSON.stringify(tsMap));
}

function loadProgress() {
  const savedScore  = localStorage.getItem('whcs_score');
  const savedSolved = localStorage.getItem('whcs_solved');
  const savedTs     = localStorage.getItem('whcs_ts');
  if (savedScore !== null) score = parseInt(savedScore) || 0;
  let tsMap = {};
  try { if (savedTs) tsMap = JSON.parse(savedTs); } catch(e) {}
  if (savedSolved) {
    try {
      JSON.parse(savedSolved).forEach(id => {
        const sep  = id.lastIndexOf('|');
        const cat  = id.slice(0, sep);
        const name = id.slice(sep + 1);
        const ch   = challenges[cat]?.find(c => c.name === name);
        if (ch) { ch.solved = true; ch.solvedAt = tsMap[id] || null; }
      });
    } catch(e) {}
  }
  document.getElementById('totalScore').textContent = score;
}

/* ════════════════════════════════════════════════════════
   LOAD challenges.json, hash answers, restore saves
   ════════════════════════════════════════════════════════ */
async function init() {
  let rawData;
  try {
    const res = await fetch("https://whcsctf-api-bdu8.onrender.com/api/challenges");
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    rawData = await res.json();
  } catch (err) {
    document.getElementById('loadState').textContent =
      `⚠ Could not load Challenges.json — ${err.message}`;
    return;
  }

  /* Hash every answer; plaintext lives only in rawData which
     goes out of scope after this loop. */
  for (const cat of Object.keys(rawData)) {
    challenges[cat] = [];
    for (const src of rawData[cat]) {
      const answers = Array.isArray(src.answer) ? src.answer : [src.answer];
      const hashes  = await Promise.all(answers.map(a => sha256(a)));
      challenges[cat].push({
        name:         src.name,
        points:       src.points,
        tags:         Array.isArray(src.tags) ? src.tags.slice(0, 5) : [],
        description:  src.description,
        path:         src.path || null,
        image:        src.image || null,
        answerHashes: src.answerHashes || [],  // ← use what the server sent
        solved:       false,
        solvedAt:     null,
      });
    }
  }

  loadProgress();
  buildFilterBar();
  renderBoard();
  document.getElementById('loadState').style.display = 'none';
  document.getElementById('filterBar').style.display = 'flex';
}

/* ════════════════════════════════════════════════════════
   FILTER BAR — collect all unique tags across every challenge
   ════════════════════════════════════════════════════════ */
function buildFilterBar() {
  const allTags = new Set();
  Object.values(challenges).forEach(list =>
    list.forEach(ch => ch.tags.forEach(t => allTags.add(t)))
  );

  const container = document.getElementById('filterTags');
  container.innerHTML = '';
  [...allTags].sort().forEach(tag => {
    const btn = document.createElement('button');
    btn.className   = 'ftag';
    btn.textContent = tag;
    btn.dataset.tag = tag;
    btn.addEventListener('click', () => toggleFilter(tag));
    container.appendChild(btn);
  });
}

function toggleFilter(tag) {
  if (activeTags.has(tag)) {
    activeTags.delete(tag);
  } else {
    activeTags.add(tag);
  }
  /* update button states */
  document.querySelectorAll('.ftag').forEach(btn => {
    btn.classList.toggle('active', activeTags.has(btn.dataset.tag));
  });
  const clearBtn = document.getElementById('filterClear');
  clearBtn.classList.toggle('visible', activeTags.size > 0);
  applyFilter();
}

document.getElementById('filterClear').addEventListener('click', () => {
  activeTags.clear();
  document.querySelectorAll('.ftag').forEach(b => b.classList.remove('active'));
  document.getElementById('filterClear').classList.remove('visible');
  applyFilter();
});

/* Show/hide cards and whole sections based on active tags.
   A card matches if it has ALL active tags (AND logic). */
function applyFilter() {
  const main = document.getElementById('boardMain');
  let anyVisible = false;

  main.querySelectorAll('.cat-section').forEach(sec => {
    let sectionHasVisible = false;
    sec.querySelectorAll('.card').forEach(card => {
      const cardTags = JSON.parse(card.dataset.tags);
      const matches  = activeTags.size === 0 ||
                       [...activeTags].every(t => cardTags.includes(t));
      card.classList.toggle('tag-hidden', !matches);
      if (matches) { sectionHasVisible = true; anyVisible = true; }
    });
    sec.classList.toggle('hidden', !sectionHasVisible);
  });

  /* global no-results notice */
  let notice = document.getElementById('noResults');
  if (!notice) {
    notice = document.createElement('p');
    notice.id        = 'noResults';
    notice.className = 'no-results';
    notice.textContent = 'No challenges match the selected tags.';
    main.appendChild(notice);
  }
  notice.classList.toggle('visible', !anyVisible && activeTags.size > 0);
}

/* ════════════════════════════════════════════════════════
   BOARD RENDER
   ════════════════════════════════════════════════════════ */
function renderBoard() {
  const main = document.getElementById('boardMain');
  /* remove category sections but keep the load-state / no-results nodes */
  main.querySelectorAll('.cat-section').forEach(n => n.remove());

  Object.keys(challenges).forEach(cat => {
    const sec    = document.createElement('section');
    sec.className = 'cat-section';
    const solved = challenges[cat].filter(c => c.solved).length;
    const total  = challenges[cat].length;
    sec.innerHTML = `<div class="cat-header">
      <span class="cat-name">${cat}</span>
      <div class="cat-line"></div>
      <span class="cat-count">${solved}/${total}</span>
    </div>`;

    const grid = document.createElement('div');
    grid.className = 'grid';

    challenges[cat].forEach(ch => {
      const card = document.createElement('div');
      card.className    = 'card' + (ch.solved ? ' solved' : '');
      card.dataset.tags = JSON.stringify(ch.tags); // used by applyFilter
      card.innerHTML = `
        <svg class="solved-icon" viewBox="0 0 24 24" fill="none" stroke="#2d6a4f" stroke-width="2.5">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        <div class="card-name">${ch.name}</div>
        <div class="card-pts">${ch.points} pts</div>`;
      card.addEventListener('click', () => openPlay(ch, cat));
      grid.appendChild(card);
    });

    sec.appendChild(grid);
    main.insertBefore(sec, main.querySelector('#noResults'));
  });

  /* re-apply any active filters after a re-render */
  if (activeTags.size > 0) applyFilter();
}

/* ════════════════════════════════════════════════════════
   TIMESTAMP
   ════════════════════════════════════════════════════════ */
function formatTs(isoStr) {
  if (!isoStr) return 'Unknown time';
  return new Date(isoStr).toLocaleString(undefined, {
    weekday:'short', year:'numeric', month:'short',
    day:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit'
  });
}

/* ════════════════════════════════════════════════════════
   PLAY MODAL
   ════════════════════════════════════════════════════════ */
function openPlay(ch, cat) {
  activePlay = { ch, cat };
  document.getElementById('mCat').textContent   = cat;
  document.getElementById('mTitle').textContent = ch.name;
  document.getElementById('mPts').textContent   = `${ch.points} points`;
  const descEl = document.getElementById('mDesc');

  if (ch.image) {
    descEl.innerHTML = `
      <div style="display:flex; flex-direction:column; align-items:center; gap:1rem;">
        <img src="${ch.image}" 
            style="max-width:100%; max-height:250px; border-radius:10px; border:1px solid var(--border); box-shadow:var(--sh-sm);" />
        <div>${ch.description}</div>
        ${ch.path ? `<a href="${ch.path}" target="_blank" style="color: var(--accent); font-weight: 600;"> Open Challenge</a>` : ""}
      </div>
    `;
  } else if (ch.path) {
    const fileName = ch.path.split('/').pop(); 

    descEl.innerHTML = `
      <div style="display:flex; flex-direction:column; align-items:center; gap:1rem;">
        <div style="text-align:center;">
          ${ch.description}
        </div>

        <a href="${ch.path}" target="_blank"
          style="display:inline-flex; align-items:right; gap:.4rem; color:var(--accent); font-weight:600; background:var(--accent-l); border:1px solid var(--solved-b); border-radius:8px; padding:.5rem 1rem; text-decoration:none; transition:background .15s;">
            Download: ${fileName}
        </a>
      </div>
    `;
  } else {
    descEl.textContent = ch.description;
  }

  const meta = document.getElementById('mMeta');
  meta.innerHTML = '';
  (ch.tags || []).forEach(t => {
    const chip = document.createElement('span');
    chip.className   = 'meta-chip';
    chip.textContent = t;
    meta.appendChild(chip);
  });

  if (ch.solved) {
    document.getElementById('ansSection').style.display    = 'none';
    document.getElementById('solvedSection').style.display = 'block';
    document.getElementById('solvedTs').textContent        = formatTs(ch.solvedAt);
    document.getElementById('fbAlready').textContent       = '';
  } else {
    document.getElementById('ansSection').style.display    = 'block';
    document.getElementById('solvedSection').style.display = 'none';
    document.getElementById('ansInput').value  = '';
    document.getElementById('fb').textContent  = '';
    document.getElementById('fb').className    = 'fb';
    document.getElementById('ansInput').classList.remove('err');
    setTimeout(() => document.getElementById('ansInput').focus(), 250);
  }
  document.getElementById('playOverlay').classList.add('open');
}

function closePlay() {
  document.getElementById('playOverlay').classList.remove('open');
  activePlay = null;
}

document.getElementById('playClose').addEventListener('click', closePlay);
document.getElementById('playOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('playOverlay')) closePlay();
});
document.getElementById('alreadyBtn').addEventListener('click', () => {
  document.getElementById('fbAlready').textContent = 'You Already Answered This Question';
});

/* ════════════════════════════════════════════════════════
   SUBMIT
   ════════════════════════════════════════════════════════ */
document.getElementById('subBtn').addEventListener('click', async () => {
  if (!activePlay || activePlay.ch.solved) return;
  const { ch } = activePlay;
  const raw = document.getElementById('ansInput').value.trim();
  const fb  = document.getElementById('fb');
  const inp = document.getElementById('ansInput');

  if (!raw) { errShake(inp, fb, 'Please enter an answer.'); return; }
  if (!ch.answerHashes?.length) {
    fb.textContent = 'No answer set for this challenge yet.';
    fb.className   = 'fb bad';
    return;
  }

  const h = await sha256(raw);
  if (ch.answerHashes.includes(h)) {
    const now   = new Date().toISOString();
    ch.solved   = true;
    ch.solvedAt = now;
    score      += ch.points;

    const el = document.getElementById('totalScore');
    el.textContent = score;
    el.classList.add('bump');
    setTimeout(() => el.classList.remove('bump'), 400);
    saveProgress();

    document.getElementById('ansSection').style.display    = 'none';
    document.getElementById('solvedSection').style.display = 'block';
    document.getElementById('solvedTs').textContent        = formatTs(now);
    document.getElementById('fbAlready').textContent       = '';

    renderBoard();
    showToast(`+${ch.points} pts — "${ch.name}" solved`);
    setTimeout(closePlay, 2200);
  } else {
    errShake(inp, fb, 'Incorrect flag. Try again.');
  }
});

function errShake(inp, fb, msg) {
  inp.classList.remove('err');
  void inp.offsetWidth;
  inp.classList.add('err');
  fb.textContent = msg;
  fb.className   = 'fb bad';
  setTimeout(() => inp.classList.remove('err'), 500);
}

/* ════════════════════════════════════════════════════════
   KEY SHORTCUTS
   ════════════════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closePlay();
  if (e.key === 'Enter' && document.getElementById('playOverlay').classList.contains('open')) {
    if (activePlay && !activePlay.ch.solved) document.getElementById('subBtn').click();
  }
});

/* ════════════════════════════════════════════════════════
   TOAST
   ════════════════════════════════════════════════════════ */
let toastT;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => t.classList.remove('show'), 2800);
}

init();
</script>
</body>
</html>
