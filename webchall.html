<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="icon" href="data:,">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: #f4f3ef;
            color: #1a1917;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .container {
            width: 100%;
            max-width: 420px;
            background: #fff;
            border: 1px solid #e2e0d8;
            border-radius: 12px;
            padding: 2.5rem 2rem;
            box-shadow: 0 4px 16px rgba(0,0,0,.08), 0 1px 4px rgba(0,0,0,.04);
        }
        h2 {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: -.02em;
            margin-bottom: 1.75rem;
        }
        label {
            display: block;
            font-size: .72rem;
            font-weight: 600;
            letter-spacing: .07em;
            text-transform: uppercase;
            color: #9e9b92;
            margin-bottom: .4rem;
        }
        input {
            width: 100%;
            font-family: 'DM Mono', monospace;
            font-size: .85rem;
            padding: .6rem .875rem;
            border: 1px solid #e2e0d8;
            border-radius: 6px;
            background: #fff;
            color: #1a1917;
            outline: none;
            margin-bottom: 1.25rem;
            transition: border-color .15s, box-shadow .15s;
        }
        input:focus {
            border-color: #52b788;
            box-shadow: 0 0 0 3px rgba(82,183,136,.15);
        }
        button {
            width: 100%;
            font-family: 'DM Sans', sans-serif;
            font-size: .875rem;
            font-weight: 500;
            background: #2d6a4f;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: .65rem 1.2rem;
            cursor: pointer;
            transition: background .15s;
            margin-top: .25rem;
        }
        button:hover { background: #245e44; }
        #message {
            margin-top: 1.25rem;
            font-size: .85rem;
            line-height: 1.6;
            min-height: 1.2em;
        }
        #message.ok {
            color: #1b4332;
            background: #d8f3dc;
            border: 1px solid #74c69d;
            border-radius: 6px;
            padding: .75rem 1rem;
        }
        #message.bad { color: #e63946; }
    </style>
</head>
<body>
<div class="container">
    <h2>🔒 Secure Login</h2>
    <!-- NO onsubmit here — handled in JS with e.preventDefault() -->
    <form id="loginForm">
        <label for="username">Username</label>
        <input type="text" id="username" autocomplete="off" spellcheck="false">

        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="off">

        <button type="submit">Login</button>
    </form>
    <p id="message"></p>
</div>

<script>
    async function sha256(str) {
        const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
        return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    }

    // e.preventDefault() guarantees the page NEVER reloads,
    // regardless of what happens inside the async function.
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const user = document.getElementById("username").value.trim();
        const pass = document.getElementById("password").value;
        const msg  = document.getElementById("message");

        msg.className   = '';
        msg.textContent = '';

        // Username must be "admin"
        if (user.toLowerCase() !== "admin") {
            msg.className   = 'bad';
            msg.textContent = "Invalid credentials";
            return;
        }

        // Simulate SQL injection: a payload like  ' OR '1'='1  bypasses the password check
        const isSQLi = pass.includes("'") && pass.toLowerCase().includes("or");

        try {
            const res = await fetch("https://whcsctf-api.onrender.com");
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();

            let targetChallenge = null;
            for (const cat of Object.values(data)) {
                const found = cat.find(ch =>
                    ch.path && (ch.path.includes("webchall") || ch.path.includes("sqli"))
                );
                if (found) { targetChallenge = found; break; }
            }

            if (!targetChallenge) {
                msg.className   = 'bad';
                msg.textContent = "Error: Challenge configuration not found.";
                return;
            }

            // Also accept the real flag typed as the password (hash-compared, never plaintext in source)
            const inputHash   = await sha256(pass);
            const correctHash = await sha256(targetChallenge.answer);

            if (isSQLi || inputHash === correctHash) {
                msg.className = 'ok';
                msg.innerHTML = `<strong>Access Granted!</strong><br>Flag: <code>${targetChallenge.answer}</code>`;
            } else {
                msg.className   = 'bad';
                msg.textContent = "Invalid credentials";
            }

        } catch (err) {
            msg.className   = 'bad';
            msg.textContent = "Error loading challenge data.";
        }
    });
</script>
</body>
</html>
